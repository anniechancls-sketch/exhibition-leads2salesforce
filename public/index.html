function genId() { return 'r_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); }

async function callAI(files) {
  var prompt = 'Extract customer info from business card/registration form images. Return a JSON array. Use ONLY these exact field names: Name, Title, email, Website, Address, Company, Continent, Nation, Phone, Mobile, TypeOfClients, InterestedIn, DemandDetails, salesman. Rules: (1) Use English field names only. (2) Nation should be English country name. (3) Continent: Asia/Europe/North America/South America/Africa/Oceania. (4) salesman: only from "Filled by" field, leave empty if not found. (5) Return valid JSON array only, no markdown.';
  var imageContents = [];
  for (var i = 0; i < files.length; i++) {
    var base64 = await new Promise(function(resolve, reject) {
      var r = new FileReader(); r.onload = function() { resolve(r.result.split(',')[1]); }; r.onerror = reject; r.readAsDataURL(files[i]);
    });
    imageContents.push({ type: 'image_url', image_url: { url: 'data:' + files[i].type + ';base64,' + base64 } });
  }
  // и°ғз”Ёд»ЈзҗҶжңҚеҠЎпјҲAPI Key еңЁжңҚеҠЎеҷЁз«Ҝпјү
  var resp = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: [{ role: 'user', content: [{ type: 'text', text: prompt }].concat(imageContents) }] })
  });
  if (!resp.ok) throw new Error('API error ' + resp.status);
  var data = await resp.json();
  var content = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
  var parsed;
  try { parsed = JSON.parse(content); } catch(e) {
    var m = content.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (m) { try { parsed = JSON.parse(m[1].trim()); } catch(e2) {} }
    if (!parsed) { m = content.match(/\[[\s\S]*\]/); if (m) { try { parsed = JSON.parse(m[0]); } catch(e3) {} } }
    if (!parsed) throw new Error('Cannot parse response');
  }
  if (!Array.isArray(parsed)) parsed = [parsed];
  var fields = ['Name','Title','email','Website','Address','Company','Continent','Nation','Phone','Mobile','TypeOfClients','InterestedIn','DemandDetails','salesman'];
  return parsed.map(function(item) {
    var r = { id: genId() };
    fields.forEach(function(f) { r[f] = String(item[f] || '').trim(); });
    return r;
  });
}

          '<div class="field-item"><label>йӮ®з®ұ Email *</label><input type="email" id="f-' + rec.id + '-email" value="' + esc(rec.email) + '" required></div>' +
          '<div class="field-item"><label>иҒҢдҪҚ Title</label><input type="text" id="f-' + rec.id + '-Title" value="' + esc(rec.Title) + '"></div>' +
          '<div class="field-item"><label>еӣҪе®¶ Nation</label><input type="text" id="f-' + rec.id + '-Nation" value="' + esc(rec.Nation) + '"></div>' +
          '<div class="field-item"><label>жҙ?Continent</label><input type="text" id="f-' + rec.id + '-Continent" value="' + esc(rec.Continent) + '"></div>' +
          '<div class="field-item"><label>з”өиҜқ Phone</label><input type="text" id="f-' + rec.id + '-Phone" value="' + esc(rec.Phone) + '"></div>' +
          '<div class="field-item"><label>жүӢжңә Mobile</label><input type="text" id="f-' + rec.id + '-Mobile" value="' + esc(rec.Mobile) + '"></div>' +
          '<div class="field-item"><label>зҪ‘еқҖ Website</label><input type="text" id="f-' + rec.id + '-Website" value="' + esc(rec.Website) + '"></div>' +
          '<div class="field-item"><label>е®ўжҲ·зұ»еһӢ Type</label><select id="f-' + rec.id + '-TypeOfClients"><option value="">иҜ·йҖүжӢ©</option>' + typeOpts + '</select></div>' +
          '<div class="field-item"><label>ж„ҹе…ҙи¶Јдә§е“?/label><input type="text" id="f-' + rec.id + '-InterestedIn" value="' + esc(rec.InterestedIn) + '"></div>' +
          '<div class="field-item"><label>й”Җе”®е‘ҳ</label><select id="f-' + rec.id + '-salesman"><option value="">иҜ·йҖүжӢ©</option>' + salesOpts + '</select></div>' +
          '<div class="field-item full"><label>ең°еқҖ Address</label><input type="text" id="f-' + rec.id + '-Address" value="' + esc(rec.Address) + '"></div>' +
          '<div class="field-item full"><label>йңҖжұӮиҜҰжғ?Demand Details</label><textarea id="f-' + rec.id + '-DemandDetails">' + esc(rec.DemandDetails) + '</textarea></div>' +
        '</div>' +
      '</div>' +
      '<div class="card-footer">' +
        '<button class="btn btn-success btn-lg w-full" onclick="submitRecord(\'' + rec.id + '\')">рҹ“® жҸҗдәӨеҲ?Pardot</button>' +
      '</div>' +
    '</div>';
  }).join('');

  state.records.forEach(function(rec) {
    var typeVal = ''; PARDOT.TYPE_OPTIONS.forEach(function(o) { if (o.label === rec.TypeOfClients) typeVal = o.value; });
    var salesVal = ''; PARDOT.SALESMAN_OPTIONS.forEach(function(o) { if (o.label === rec.salesman) salesVal = o.value; });
    var typeEl = document.getElementById('f-' + rec.id + '-TypeOfClients');
    var salesEl = document.getElementById('f-' + rec.id + '-salesman');
    if (typeEl && typeVal) typeEl.value = typeVal;
    if (salesEl && salesVal) salesEl.value = salesVal;
  });
}

function getRecordData(id) {
  var rec = state.records.find(function(r) { return r.id === id; });
  if (!rec) return null;
  var fields = ['Name','Company','email','Title','Nation','Continent','Phone','Mobile','Website','InterestedIn','Address','DemandDetails'];
  fields.forEach(function(f) {
    var el = document.getElementById('f-' + id + '-' + f);
    if (el) rec[f] = el.value;
  });
  var typeEl = document.getElementById('f-' + id + '-TypeOfClients');
  var salesEl = document.getElementById('f-' + id + '-salesman');
  rec._typeValue = typeEl ? typeEl.value : '';
  rec._salesValue = salesEl ? salesEl.value : '';
  return rec;
}

function doSubmitOne(rec, onDone) {
  if (!rec.email || !rec.email.trim()) {
    showToast('вқ?е®ўжҲ·' + (state.records.indexOf(rec) + 1) + ' йӮ®з®ұдёәз©әпјҢе·Іи·іиҝҮ');
    onDone(false);
    return;
  }
  var form = document.createElement('form');
  form.method = 'POST';
  form.action = PARDOT.FORM_URL;
  form.target = '_blank';
  form.style.display = 'none';

  function addField(name, value) {
    if (!value || !String(value).trim()) return;
    var input = document.createElement('input');
    input.type = 'hidden';
    input.name = name;
    input.value = value;
    form.appendChild(input);
  }

  addField('_utf8', 'вң?);
  addField(PARDOT.FIELDS.Name, rec.Name);
  addField(PARDOT.FIELDS.Company, rec.Company);
  addField(PARDOT.FIELDS.email, rec.email);
  addField(PARDOT.FIELDS.Website, rec.Website);
  addField(PARDOT.FIELDS.Title, rec.Title);
  addField(PARDOT.FIELDS.Nation, rec.Nation);
  addField(PARDOT.FIELDS.Continent, rec.Continent);
  addField(PARDOT.FIELDS.Address, rec.Address);
  addField(PARDOT.FIELDS.Phone, rec.Phone);
  addField(PARDOT.FIELDS.Mobile, rec.Mobile);
  addField(PARDOT.FIELDS.InterestedIn, rec.InterestedIn);
  addField(PARDOT.FIELDS.DemandDetails, rec.DemandDetails);
  if (rec._typeValue) addField(PARDOT.FIELDS.TypeOfClients, rec._typeValue);
  if (rec._salesValue) addField(PARDOT.FIELDS.salesman, rec._salesValue);

  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
  onDone(true);
}

function submitAll() {
  if (!state.records.length) { showToast('жҡӮж— и®°еҪ•еҸҜжҸҗдә?); return; }
  var total = state.records.length;
  var idx = 0;
  var success = 0;
  var skipped = 0;
  var totalEmails = state.records.filter(function(r) { return r.email && r.email.trim(); }).length;
  if (!confirm('зЎ®и®Өжү№йҮҸжҸҗдәӨ ' + total + ' жқЎе®ўжҲ·дҝЎжҒҜеҲ° Pardotпјҹ\nпјҲе…¶дё?' + totalEmails + ' жқЎжңүйӮ®з®ұпјү\n\nе°Ҷдҫқж¬ЎжҸҗдәӨе®ўжҲ·дҝЎжҒҜпјҢе…ЁйғЁжҸҗдәӨе®ҢжҲҗеҗҺиҜ·зЎ®и®ӨжҸҗдәӨз»“жһңпјҢеҰӮжңүй—®йўҳиҜ·жҢүжҸҗзӨәдҝ®ж”№еҗҺйҮҚж–°жҸҗдәӨпј?)) return;
  showToast('ејҖе§Ӣжү№йҮҸжҸҗдә?.. з¬?1/' + total);
  function next() {
    if (idx >= state.records.length) {
      showToast('вң?жү№йҮҸжҸҗдәӨе®ҢжҲҗпјҒжҲҗеҠ?' + success + ' жқЎпјҢи·іиҝҮ ' + skipped + ' жқЎпјҲж— йӮ®з®ұпјү');
      return;
    }
    var rec = getRecordData(state.records[idx].id);
    var pos = idx + 1;
    if (!rec.email || !rec.email.trim()) {
      skipped++;
      idx++;
      next();
      return;
    }
    doSubmitOne(rec, function(ok) {
      if (ok) success++;
      idx++;
      if (idx < state.records.length) {
        showToast('е·ІжҸҗдә?' + pos + '/' + total + 'пјҢз»§з»?..');
        setTimeout(next, 500);
      } else {
        if (success > 0) {
          showToast('вң?жү№йҮҸжҸҗдәӨе®ҢжҲҗпјҒжҲҗеҠ?' + success + ' жқЎпјҢи·іиҝҮ ' + skipped + ' жқ?);
        }
      }
    });
  }
  next();
}

function submitRecord(id) {
  var rec = getRecordData(id);
  if (!rec) return;
  if (!rec.email || !rec.email.trim()) { alert('вқ?йӮ®з®ұдёәеҝ…еЎ«еӯ—ж®?); return; }
  if (!confirm('зЎ®и®ӨжҸҗдәӨеҲ?Pardotпјҹ\n\nрҹ“§ ' + rec.email + '\nрҹҸў ' + (rec.Company || '-') + '\nрҹ‘Ө ' + (rec.Name || '-'))) return;
  doSubmitOne(rec, function(ok) {
    if (ok) {
      // дёҚиҮӘеҠЁеҲ йҷӨпјҢи®©з”ЁжҲ·жүӢеҠЁзЎ®и®ӨеҗҺеҶҚеҲ йҷ?      showToast('вң?е·ІеңЁж–°зӘ—еҸЈжҸҗдәӨпјҢиҜ·зЎ®и®?Pardot з»“жһңеҗҺжүӢеҠЁеҲ йҷӨи®°еҪ?);
    } else {
      showToast('вқ?жҸҗдәӨеӨұиҙҘпјҢиҜ·йҮҚиҜ•');
    }
  });
}

function deleteRecord(id) {
  if (!confirm('зЎ®е®ҡеҲ йҷӨиҝҷжқЎи®°еҪ•пј?)) return;
  state.records = state.records.filter(function(r) { return r.id !== id; });
  renderRecords();
  showToast('е·ІеҲ йҷ?);
}
</script>
